<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow">
  <title>Ibonarium Cosmo Dynamics LAB LIVE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #cfefff;
      font-family: 'Cinzel', serif;
      overflow-y: auto;
    }
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: #000;
      border-radius: 12px;
    }
    .header {
      text-align: center;
      padding: 8px 4px;
    }
    .main-title {
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      text-shadow: 0 0 10px #ffcc00;
      color: #fff;
      transition: all 0.3s ease;
    }
    .main-title:hover {
      text-shadow: 0 0 25px #ffcc00;
      transform: scale(1.02);
    }
    .content {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .block {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
      background: #111;
    }
    .block:hover { transform: scale(1.01); }
    .block img, .block video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 10px;
    }
    .red-gif img { filter: hue-rotate(0deg) saturate(1.6) brightness(1.1); }
    .blue-gif img { filter: hue-rotate(200deg) saturate(1.6) brightness(1.1); }
    .footer {
      text-align: center;
      padding: 8px 0;
      font-size: clamp(10px, 2vw, 12px);
      opacity: 0.8;
      letter-spacing: 0.05em;
      margin-top: 20px;
    }
    @media (max-width: 768px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="wrapper">
  <div class="header">
    <div class="main-title" onclick="window.open('https://t.me/ibonariumcosmodynamicslablive', '_blank')">
      Ibonarium Cosmo Dynamics LAB LIVE
    </div>
  </div>

  <div class="content">
    <!-- Ряд 1 -->
    <div class="row">
      <div class="block red-gif">
        <img src="https://soho.nascom.nasa.gov/data/LATEST/current_c2.gif" alt="LASCO C2" loading="lazy">
      </div>
      <div class="block">
        <img src="http://sdowww.lmsal.com/sdomedia/SunInTime/mostrecent/l0171.jpg?t=" + new Date().getTime() alt="AIA 171" loading="lazy">
      </div>
    </div>

    <!-- Ряд 2 -->
    <div class="row">
      <div class="block blue-gif">
        <img src="https://soho.nascom.nasa.gov/data/LATEST/current_c3.gif" alt="LASCO C3" loading="lazy">
      </div>
      <div class="block">
        <img src="http://sdowww.lmsal.com/sdomedia/SunInTime/mostrecent/l0193.jpg?t=" + new Date().getTime() alt="AIA 193" loading="lazy">
      </div>
    </div>

    <!-- Ряд 3 -->
    <div class="row">
      <div class="block">
        <img src="http://sdowww.lmsal.com/sdomedia/SunInTime/mostrecent/l0304.jpg?t=" + new Date().getTime() alt="AIA 304" loading="lazy">
      </div>
      <div class="block">
        <img src="http://sdowww.lmsal.com/sdomedia/SunInTime/mostrecent/l0211.jpg?t=" + new Date().getTime() alt="AIA 211" loading="lazy">
      </div>
    </div>

    <!-- Ряд 4 -->
    <div class="row">
      <div class="block">
        <img src="http://sdowww.lmsal.com/sdomedia/SunInTime/mostrecent/l0131.jpg?t=" + new Date().getTime() alt="AIA 131" loading="lazy">
      </div>
      <div class="block">
        <img src="http://sdowww.lmsal.com/sdomedia/SunInTime/mostrecent/l0094.jpg?t=" + new Date().getTime() alt="AIA 094" loading="lazy">
      </div>
    </div>

    <!-- Відео-анімації – тепер з робочими synoptic mp4 -->
    <div class="row">
      <div class="block">
        <video controls autoplay loop muted playsinline>
          <source src="https://sdo.gsfc.nasa.gov/assets/img/latest/mpeg/latest_1024_0171_synoptic.mp4?t=" + new Date().getTime() type="video/mp4">
          Анімація AIA 171 (synoptic) не завантажилась
        </video>
      </div>
      <div class="block">
        <video controls autoplay loop muted playsinline>
          <source src="https://sdo.gsfc.nasa.gov/assets/img/latest/mpeg/latest_1024_0193_synoptic.mp4?t=" + new Date().getTime() type="video/mp4">
          Анімація AIA 193 (synoptic) не завантажилась
        </video>
      </div>
    </div>

    <div class="row">
      <div class="block">
        <video controls autoplay loop muted playsinline>
          <source src="https://sdo.gsfc.nasa.gov/assets/img/latest/mpeg/latest_1024_0211_synoptic.mp4?t=" + new Date().getTime() type="video/mp4">
          Анімація AIA 211 (synoptic) не завантажилась
        </video>
      </div>
      <div class="block">
        <video controls autoplay loop muted playsinline>
          <source src="https://sdo.gsfc.nasa.gov/assets/img/latest/mpeg/latest_1024_0304_synoptic.mp4?t=" + new Date().getTime() type="video/mp4">
          Анімація AIA 304 (synoptic) не завантажилась
        </video>
      </div>
    </div>
  </div>

  <div class="footer">
    sun.sun.sun / live / cosmodynamics.lab.live
  </div>
</div>

<script>
// STARFIELD (без змін)
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let W, H, stars = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  stars = Array.from({length: 180}, () => ({
    x: Math.random()*W, y: Math.random()*H, z: Math.random()*W
  }));
}
resize();
window.addEventListener("resize", resize);

function render() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = "#4dd2ff";
  stars.forEach(s => {
    s.z -= 0.25;
    if (s.z <= 0) s.z = W;
    const k = 128 / s.z;
    const x = (s.x - W/2) * k + W/2;
    const y = (s.y - H/2) * k + H/2;
    if (x>0 && x<W && y>0 && y<H) {
      const size = (1 - s.z/W)*3;
      ctx.fillRect(x,y,size,size);
    }
  });
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
